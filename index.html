<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Medimeisterschaften Voting</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:1rem}
input,button{font-family:inherit}
input{background:#1e293b;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:9px 12px;font-size:14px;width:100%;outline:none;margin-bottom:8px}
input::placeholder{color:#475569}
button{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:8px;padding:9px 16px;font-size:14px;cursor:pointer}
button.primary{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;font-weight:500}
button.danger{color:#f87171}
.card{background:#1e293b;border:0.5px solid #334155;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.muted{color:#94a3b8;font-size:13px}
.accent{color:#a78bfa}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
h2{font-size:18px;font-weight:500}
h3{font-size:15px;font-weight:500;margin-bottom:10px}
.badge{font-size:11px;padding:2px 10px;border-radius:999px;display:inline-block}
.badge-green{background:#14532d;color:#4ade80}
.badge-purple{background:#1e1b4b;color:#a78bfa}
#app{max-width:560px;margin:0 auto}
.star-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:2px 1px;color:#374151;transition:color 0.1s}
.star-btn.lit{color:#facc15}
.row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid #334155}
.row:last-child{border-bottom:none}
.group-label{font-size:11px;font-weight:500;color:#a78bfa;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px}
.submit-btn{width:100%;padding:14px;font-size:16px;font-weight:500;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 20px rgba(124,58,237,0.35);margin-bottom:20px}
.bar-wrap{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px}
.bar-bg{background:#0f172a;border-radius:6px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width 0.6s ease;background:#334155}
.bar-fill.top{background:linear-gradient(90deg,#a78bfa,#60a5fa)}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.extra-circle{width:42px;height:42px;border-radius:50%;font-weight:500;cursor:pointer;font-size:15px;background:#1e293b;border:1px solid #334155;color:#94a3b8;transition:all 0.15s}
.extra-circle.active{background:#3b0764;border:2px solid #a78bfa;color:#a78bfa}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.center{text-align:center;padding:3rem 1rem}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="app"></div>

<script>
const CATS=[
  {id:"catchiness",label:"Catchiness",group:"🎵 Song / Musik"},
  {id:"gesang",label:"Gesang",group:"🎵 Song / Musik"},
  {id:"produktion",label:"Produktion",group:"🎵 Song / Musik"},
  {id:"witz",label:"Witz",group:"✍️ Lyrics / Texte"},
  {id:"kreativitaet",label:"Kreativität",group:"✍️ Lyrics / Texte"},
  {id:"medizinbezug",label:"Medizinbezug",group:"✍️ Lyrics / Texte"},
  {id:"idee",label:"Idee & Storyline",group:"💡 Video-Konzept"},
  {id:"originalitaet",label:"Originalität",group:"💡 Video-Konzept"},
  {id:"cinematography",label:"Cinematography",group:"🎬 Umsetzung / Schnitt"},
  {id:"effekte",label:"Effekte",group:"🎬 Umsetzung / Schnitt"},
  {id:"tempo",label:"Tempo / Schnitt",group:"🎬 Umsetzung / Schnitt"},
  {id:"vibe",label:"Gesamtvibe",group:"🔥 Fakultäts-Vibe"},
];
const HOST_CODE="host2024";
const COLORS=["#a78bfa","#34d399","#fb923c","#60a5fa","#f472b6","#facc15"];

const BAKED_KEY="$2a$10$ogmDdAflk6IX8KDvLW3RAeK8sVWszadAEX14oNTkRXxx90cshkXW.";
const BAKED_BIN="6a173d9521f9ee59d2926da8";
let state={view:"init",name:"",isHost:false,apiKey:BAKED_KEY,binId:BAKED_BIN,videos:[],currentId:null,votes:{},voters:[],myVotes:{},extra:0,extraNote:"",submitted:false,syncing:false,ready:false};
let syncInterval=null;

// JSONBin helpers
async function binGet(){
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BAKED_BIN}/latest`,{
      headers:{"X-Master-Key":BAKED_KEY,"X-Access-Key":BAKED_KEY}
    });
    console.log("binGet status:",r.status);
    if(!r.ok){console.error("binGet failed:",await r.text());return null;}
    const d=await r.json();
    console.log("binGet record:",d.record);
    return d.record;
  }catch(e){console.error("binGet error:",e);return null;}
}
async function binSet(data){
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BAKED_BIN}`,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":BAKED_KEY},
      body:JSON.stringify(data)
    });
    console.log("binSet status:",r.status);
    if(!r.ok) console.error("binSet failed:",await r.text());
  }catch(e){console.error("binSet error:",e);}
}

async function syncDown(){
  if(!state.name && !state.isHost) return;
  const data=await binGet(); if(!data) return;
  state.videos=data.videos||[];
  const prevId=state.currentId;
  state.currentId=data.currentId||null;
  state.votes=data.votes||{};
  state.voters=data.voters||[];
  if(state.currentId && state.currentId!==prevId){
    state.myVotes={}; state.extra=0; state.extraNote=""; state.submitted=false;
  }
  render();
autoInit();
}
async function syncUp(data){
  state.syncing=true; render();
  await binSet(data);
  state.syncing=false; render();
}

function startSync(){
  if(syncInterval) clearInterval(syncInterval);
  syncInterval=setInterval(syncDown,3000);
}

// Confetti
function fireConfetti(){
  const canvas=document.getElementById("confetti-canvas");
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const particles=Array.from({length:120},()=>({
    x:Math.random()*canvas.width, y:-10-Math.random()*100,
    r:4+Math.random()*6, d:2+Math.random()*3,
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    angle:Math.random()*Math.PI*2, spin:(Math.random()-0.5)*0.2,
    drift:(Math.random()-0.5)*2,
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
      ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(0,1-p.y/canvas.height);
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6); ctx.restore();
      p.y+=p.d; p.x+=p.drift; p.angle+=p.spin;
    });
    frame++;
    if(frame<180) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  requestAnimationFrame(draw);
}

// Render helpers
function grouped(){
  return CATS.reduce((a,c)=>{if(!a[c.group])a[c.group]=[];a[c.group].push(c);return a;},{});
}
function getStats(vid){
  const vv=state.votes[vid]||{}; const vl=Object.keys(vv); if(!vl.length) return null;
  const ct={}; CATS.forEach(c=>{ct[c.id]=0;}); let extra=0,total=0;
  vl.forEach(v=>{CATS.forEach(c=>{ct[c.id]+=(vv[v].cats?.[c.id]||0);}); extra+=vv[v].extra||0;});
  CATS.forEach(c=>{total+=ct[c.id];}); total+=extra;
  const avg={}; CATS.forEach(c=>{avg[c.id]=(ct[c.id]/vl.length).toFixed(1);});
  return{catAvg:avg,rawTotal:total,extraTotal:extra,count:vl.length};
}
function getRankings(){
  return [...state.videos].map(v=>({...v,stats:getStats(v.id),total:getStats(v.id)?.rawTotal||0})).sort((a,b)=>b.total-a.total);
}

function stars(catId){
  const val=state.myVotes[catId]||0;
  return Array.from({length:5},(_,i)=>{
    const lit=i<val;
    return `<button class="star-btn${lit?' lit':''}" onclick="setStar('${catId}',${i+1})">★</button>`;
  }).join("");
}

function barChart(rankings){
  const max=Math.max(...rankings.map(r=>r.total),1);
  return rankings.map((v,i)=>{
    const pct=Math.round((v.total/max)*100);
    const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`;
    return `<div class="bar-wrap">
      <div class="bar-label"><span>${medal} ${esc(v.title)}</span><span class="accent" style="font-weight:500">${v.total} Pkt</span></div>
      <div class="bar-bg"><div class="bar-fill${i===0?' top':''}" style="width:${pct}%"></div></div>
      ${v.stats?`<div class="muted" style="margin-top:2px;font-size:11px">${v.stats.count} Votes · +${v.stats.extraTotal} Extra</div>`:""}
    </div>`;
  }).join("");
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function render(){
  const app=document.getElementById("app");
  const v=state.view;

  if(v==="error"){
    app.innerHTML=`<div class="card center"><div style="font-size:32px;margin-bottom:12px">⚠️</div><p style="color:#f87171;font-weight:500;margin-bottom:8px">Verbindungsfehler</p><p class="muted" style="font-size:13px">${esc(state.errorMsg||"Unbekannter Fehler")}</p><p class="muted" style="font-size:12px;margin-top:8px">Öffne die Browser-Konsole (Cmd+Option+J) für Details.</p></div>`;
    return;
  }

  if(v==="login"){
    app.innerHTML=`
      <div style="text-align:center;margin-bottom:24px;padding-top:1.5rem">
        <div style="font-size:36px;margin-bottom:8px">🎬</div>
        <h1>Medimeisterschaften</h1>
        <p class="muted" style="margin-top:4px">Voting Night</p>
      </div>
      <div class="card">
        <label class="muted">Dein Name</label>
        <input id="name-input" placeholder="z.B. Lisa" style="margin-top:6px" onkeydown="if(event.key==='Enter')handleLogin()"/>
        <button class="primary" style="width:100%" onclick="handleLogin()">Einloggen</button>
      </div>
      <div class="card">
        <label class="muted">Host-Zugang</label>
        <input id="host-input" type="password" placeholder="Host-Code" style="margin-top:6px" onkeydown="if(event.key==='Enter')handleHostLogin()"/>
        <div id="host-err" style="color:#f87171;font-size:13px;margin-bottom:8px;display:none">Falscher Code.</div>
        <button style="width:100%" onclick="handleHostLogin()">Als Host einloggen</button>
      </div>
      <p style="font-size:11px;color:#475569;text-align:center">Host-Code: <code style="color:#a78bfa">host2024</code></p>`;
    return;
  }

  if(v==="host"){
    const rankings=getRankings();
    const hasVotes=rankings.some(r=>r.stats);
    app.innerHTML=`
      <div class="topbar">
        <h2>🎛 Host-Panel</h2>
        <div style="display:flex;gap:8px;align-items:center">
          ${state.syncing?'<span class="muted" style="font-size:11px">Sync…</span>':""}
          <button class="danger" onclick="handleReset()">Reset</button>
        </div>
      </div>
      <div class="card">
        <h3>Video hinzufügen</h3>
        <input id="new-title" placeholder="Titel"/>
        <input id="new-url" placeholder="YouTube-URL (optional)"/>
        <button class="primary" onclick="handleAddVideo()">Hinzufügen</button>
      </div>
      <div class="card">
        <h3>Videos</h3>
        ${state.videos.length===0?'<p class="muted">Noch keine Videos.</p>':state.videos.map(v=>{
          const isActive=state.currentId===v.id;
          const vc=Object.keys(state.votes[v.id]||{}).length;
          return `<div class="row" style="gap:8px">
            <div style="flex:1">
              <div style="font-size:14px;color:#f1f5f9;font-weight:${isActive?500:400}">${esc(v.title)}</div>
              <div style="font-size:11px;color:#64748b">${vc} Vote${vc!==1?"s":""}</div>
            </div>
            ${isActive?'<span class="badge badge-green">Aktiv</span>':""}
            <button ${isActive?'class="primary"':''} onclick="handleSetVideo('${v.id}')" style="font-size:12px">${isActive?"✓":"Setzen"}</button>
            <button class="danger" onclick="handleRemoveVideo('${v.id}')" style="font-size:12px">✕</button>
          </div>`;
        }).join("")}
      </div>
      <div class="card">
        <h3>🏆 Zwischenergebnis <span style="font-size:11px;color:#64748b;font-weight:400">(nur für dich)</span></h3>
        ${hasVotes?barChart(rankings):'<p class="muted">Noch keine Votes.</p>'}
      </div>
      <div class="card">
        <h3>Eingeloggte (${state.voters.length})</h3>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${state.voters.length===0?'<span class="muted">Noch niemand.</span>':state.voters.map(n=>`<span class="badge badge-purple">${esc(n)}</span>`).join("")}
        </div>
      </div>`;
    return;
  }

  // Voter view
  const cur=state.videos.find(v=>v.id===state.currentId)||null;
  const hasVoted=state.submitted||(state.name&&cur&&state.votes[cur?.id]?.[state.name]);
  const grps=grouped();

  app.innerHTML=`
    <div class="topbar">
      <span class="muted" style="font-size:13px">👤 <strong style="color:#f1f5f9">${esc(state.name)}</strong></span>
      <button onclick="handleLogout()" style="font-size:12px;padding:6px 12px">Abmelden</button>
    </div>
    ${!cur?`
      <div class="card center">
        <div style="font-size:40px;margin-bottom:12px">⏳</div>
        <p style="font-weight:500;color:#f1f5f9;margin-bottom:6px">Warte auf den Host …</p>
        <p class="muted">Sobald ein Video gestartet wird, kannst du abstimmen.</p>
      </div>
    `:hasVoted?`
      <div class="card center" style="background:#14532d;border-color:#166534">
        <div style="font-size:40px;margin-bottom:12px">✅</div>
        <p style="font-weight:500;color:#4ade80;margin-bottom:6px">Vote gezählt!</p>
        <p style="color:#86efac;font-size:13px">Warte auf das nächste Video.</p>
      </div>
    `:`
      <div class="card" style="border-left:3px solid #a78bfa;margin-bottom:10px">
        <div class="muted" style="font-size:11px;margin-bottom:3px">Aktuelles Video</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:16px;font-weight:500;color:#f1f5f9">${esc(cur.title)}</span>
          ${cur.url?`<a href="${esc(cur.url)}" target="_blank" style="font-size:12px;color:#a78bfa;text-decoration:none;margin-left:8px;white-space:nowrap">▶ YouTube</a>`:""}
        </div>
      </div>
      ${Object.entries(grps).map(([grp,cats])=>`
        <div class="card">
          <div class="group-label">${grp}</div>
          ${cats.map(c=>`
            <div class="row">
              <span style="font-size:14px;color:#f1f5f9">${esc(c.label)}</span>
              <div>${stars(c.id)}</div>
            </div>
          `).join("")}
        </div>
      `).join("")}
      <div class="card">
        <div class="group-label">⭐ Extrapunkte (0–3)</div>
        <div style="display:flex;gap:10px;margin-bottom:10px">
          ${[0,1,2,3].map(n=>`<button class="extra-circle${state.extra===n?' active':''}" onclick="setExtra(${n})">${n}</button>`).join("")}
        </div>
        <input id="extra-note" placeholder="Begründung (optional)" value="${esc(state.extraNote)}" oninput="state.extraNote=this.value"/>
      </div>
      <button class="submit-btn" onclick="handleSubmit()" ${state.syncing?"disabled":""}>
        ${state.syncing?"Wird gespeichert…":"Vote abschicken 🎬"}
      </button>
    `}`;
}

// Actions

  {id:"v1",title:"Regensburg - chuchu.mp3",url:""},

];

async function autoInit(){
  const existing=await binGet();
  if(!existing||!existing.videos||existing.videos.length===0){
    await binSet({videos:PRESET_VIDEOS,currentId:null,votes:{},voters:[]});
    state.videos=PRESET_VIDEOS;
  } else {
    state.videos=existing.videos||[];
    state.currentId=existing.currentId||null;
    state.votes=existing.votes||{};
    state.voters=existing.voters||[];
  }
  state.view="login"; render();
}

async function handleLogin(){
  const t=document.getElementById("name-input")?.value.trim(); if(!t) return;
  state.name=t;
  await syncDown();
  const voters=[...state.voters];
  if(!voters.includes(t)){voters.push(t); state.voters=voters;}
  await syncUp({videos:state.videos,currentId:state.currentId,votes:state.votes,voters:state.voters});
  state.view="main"; startSync(); render();
}

function handleHostLogin(){
  const code=document.getElementById("host-input")?.value;
  if(code===HOST_CODE){state.isHost=true; state.view="host"; startSync(); render();}
  else{const e=document.getElementById("host-err"); if(e)e.style.display="block";}
}

function handleLogout(){clearInterval(syncInterval); state.view="login"; state.name=""; state.submitted=false; render();}

async function handleSetVideo(id){
  state.currentId=id; state.myVotes={}; state.extra=0; state.extraNote=""; state.submitted=false;
  await syncUp({videos:state.videos,currentId:id,votes:state.votes,voters:state.voters});
  render();
}

async function handleAddVideo(){
  const t=document.getElementById("new-title")?.value.trim(); if(!t) return;
  const u=document.getElementById("new-url")?.value.trim()||"";
  const id=Date.now().toString();
  state.videos=[...state.videos,{id,title:t,url:u}];
  await syncUp({videos:state.videos,currentId:state.currentId,votes:state.votes,voters:state.voters});
  render();
}

async function handleRemoveVideo(id){
  state.videos=state.videos.filter(v=>v.id!==id);
  if(state.currentId===id) state.currentId=null;
  await syncUp({videos:state.videos,currentId:state.currentId,votes:state.votes,voters:state.voters});
  render();
}

function setStar(catId,val){
  state.myVotes[catId]=state.myVotes[catId]===val?0:val; render();
}

function setExtra(n){state.extra=n; render();}

async function handleSubmit(){
  const cur=state.videos.find(v=>v.id===state.currentId); if(!cur||!state.name) return;
  const fresh=await binGet();
  const freshVotes=fresh?.votes||state.votes;
  const updated={...freshVotes,[cur.id]:{...(freshVotes[cur.id]||{}),[state.name]:{cats:state.myVotes,extra:state.extra,note:state.extraNote}}};
  state.votes=updated; state.submitted=true;
  await syncUp({videos:state.videos,currentId:state.currentId,votes:updated,voters:state.voters});
  fireConfetti(); render();
}

async function handleReset(){
  if(!confirm("Wirklich alles zurücksetzen?")) return;
  state.videos=[]; state.currentId=null; state.votes={}; state.voters=[];
  await syncUp({videos:[],currentId:null,votes:{},voters:[]});
  state.view="login"; state.name=""; state.isHost=false; render();
}
